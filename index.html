<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Interactive Clock</title>
    <link rel="stylesheet" href="style.css" />
  </head>
<body>
    <div class="clock-wrapper">

          <!-- Top controls -->
          <div class="controls top-controls">
                  <div class="control-group left">
                            <button id="toggleHour" class="toggle-btn">OFF</button>button>
                            <span class="label">Hour Hand</span>span>
                  </div>div>
                  <div class="control-group right">
                            <span class="label">Minute Hand</span>span>
                            <button id="toggleMinute" class="toggle-btn">OFF</button>button>
                  </div>div>
          </div>div>

          <!-- Clock canvas -->
          <canvas id="clock" width="500" height="500"></canvas>canvas>

          <!-- Bottom controls -->
          <div class="controls bottom-controls">
                  <div class="control-group left">
                            <button id="toggleDash" class="toggle-btn">OFF</button>button>
                            <span class="label">Dash Lines</span>span>
                            <div class="color-picker">
                                        <button class="color-dot active" data-color="#000000" style="background:#000000"></button>button>
                                        <button class="color-dot" data-color="#1a73e8" style="background:#1a73e8"></button>button>
                                        <button class="color-dot" data-color="#e84b1a" style="background:#e84b1a"></button>button>
                                        <button class="color-dot" data-color="#1ae84b" style="background:#1ae84b"></button>button>
                            </div>div>
                  </div>div>
                  <div class="control-group right">
                            <button id="toggleDigital" class="toggle-btn">OFF</button>button>
                            <span class="label">Digital</span>span>
                            <button id="btn12" class="mode-btn active">12</button>button>
                            <button id="btn24" class="mode-btn">24</button>button>
                  </div>div>
          </div>div>

    </div>div>
    <script src="clock.js"></script>
</body>
</html>html>
</body></title>
  </head>
